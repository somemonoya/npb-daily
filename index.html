<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPB Daily Results</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500&family=Noto+Sans:wght@400;500&display=swap');

  :root {
    --navy: #0D1B3E;
    --gold: #D4AF37;
    --red:  #C41E3A;
    --bg:   #f5f5f0;
    --bg2:  #ffffff;
    --text: #1a1a1a;
    --text2:#666;
    --bd:   rgba(0,0,0,.1);
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#1a1a1a; --bg2:#242424; --text:#e8e8e4; --text2:#999; --bd:rgba(255,255,255,.1); }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); padding: 24px 16px; }
  #app { max-width: 720px; margin: 0 auto; }

  /* HEADER */
  .site-header {
    background: var(--navy);
    padding: 14px 20px;
    border-radius: 12px;
    margin-bottom: 28px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #fff; letter-spacing: 2px; }
  .logo span { color: var(--gold); }
  .site-sub { font-size: 11px; color: rgba(255,255,255,.5); letter-spacing: 1px; text-transform: uppercase; }

  /* DATE HEADING */
  .date-heading {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--navy);
    color: var(--text);
  }

  /* GAME BLOCK — one per game */
  .game-block {
    background: var(--bg2);
    border: .5px solid var(--bd);
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  /* SCORE ROW */
  .score-row {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    gap: 10px;
  }
  .team-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .team-col.right { text-align: right; }
  .team-name {
    font-size: 15px;
    font-weight: 500;
  }
  .team-name.winner { color: var(--red); }
  .venue {
    font-size: 11px;
    color: var(--text2);
  }
  .score-center {
    text-align: center;
    min-width: 90px;
  }
  .score-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 3px;
    line-height: 1;
  }
  .score-label {
    font-size: 10px;
    color: var(--text2);
    letter-spacing: .5px;
    margin-top: 2px;
  }

  /* VIDEO EMBED */
  .video-wrap {
    border-top: .5px solid var(--bd);
    aspect-ratio: 16 / 9;
    background: #000;
  }
  .video-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  .no-video {
    border-top: .5px solid var(--bd);
    padding: 10px 18px;
    font-size: 11px;
    color: var(--text2);
  }

  /* DAY SECTION */
  .day-section { margin-bottom: 40px; }

  /* TWO COLUMN LAYOUT */
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 24px;
    align-items: start;
  }
  .sidebar { position: sticky; top: 20px; }

  /* STANDINGS */
  .standings-box {
    background: var(--bg2);
    border: .5px solid var(--bd);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .standings-head {
    background: var(--navy);
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 500;
    color: #fff;
    letter-spacing: .5px;
  }
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .standings-table th {
    padding: 6px 8px;
    text-align: center;
    color: var(--text2);
    font-weight: 500;
    font-size: 10px;
    border-bottom: .5px solid var(--bd);
    letter-spacing: .5px;
  }
  .standings-table th:first-child { text-align: left; padding-left: 14px; }
  .standings-table td {
    padding: 7px 8px;
    text-align: center;
    border-bottom: .5px solid var(--bd);
  }
  .standings-table td:first-child { text-align: left; padding-left: 14px; font-weight: 500; }
  .standings-table tr:last-child td { border-bottom: none; }
  .standings-table tr:hover td { background: var(--bg); }
  .rank-num { color: var(--text2); font-size: 11px; margin-right: 6px; }
  .rank-1 .rank-num { color: var(--gold); font-weight: 700; }
  .pct-col { font-weight: 500; }
  .standings-updated {
    font-size: 10px;
    color: var(--text2);
    padding: 5px 14px 8px;
    text-align: right;
  }

  @media (max-width: 700px) {
    .main-layout { grid-template-columns: 1fr; }
    .sidebar { position: static; }
  }
  @media (max-width: 480px) {
    .team-name { font-size: 13px; }
    .score-num  { font-size: 26px; }
    .score-center { min-width: 70px; }
  }
</style>
</head>

/* =====================================================
   ★ 順位表データ ★
   毎日かわったら数字を更新するだけ。
   updated: 最終更新日
   teams の各項目:
     name  : チーム名
     g     : 試合数
     w     : 勝
     l     : 敗
     t     : 引分
     pct   : 勝率（小数点3桁）
     gb    : ゲーム差（首位は "-"）
===================================================== */
const STANDINGS = {
  updated: "March 29, 2026",
  central: [
  ],
  pacific: [
  ],
};
/* =====================================================
   ↑ データはここまで。以下は触らなくてOK
===================================================== */

function toEmbedUrl(url) {
  if (!url) return null;
  const m1 = url.match(/[?&]v=([^&]+)/);
  const m2 = url.match(/youtu\.be\/([^?]+)/);
  const id = m1 ? m1[1] : m2 ? m2[1] : null;
  return id ? `https://www.youtube.com/embed/${id}` : null;
}

function formatDate(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

function render() {
  const sorted = [...DATA].sort((a, b) => b.date.localeCompare(a.date));

  const html = sorted.map(day => {
    const gamesHtml = day.games.map(g => {
      const awayWin = g.awayScore > g.homeScore;
      const homeWin = g.homeScore > g.awayScore;
      const embed = toEmbedUrl(g.videoUrl);
      const result = awayWin ? 'Away win' : homeWin ? 'Home win' : 'Tie';

      return `
        <div class="game-block">
          <div class="score-row">
            <div class="team-col">
              <div class="team-name ${awayWin ? 'winner' : ''}">${g.away}</div>
              <div class="venue">${g.venue || ''}</div>
            </div>
            <div class="score-center">
              <div class="score-num">${g.awayScore} - ${g.homeScore}</div>
              <div class="score-label">${result.toUpperCase()}</div>
            </div>
            <div class="team-col right">
              <div class="team-name ${homeWin ? 'winner' : ''}">${g.home}</div>
            </div>
          </div>
          ${embed
            ? `<div class="video-wrap"><iframe src="${embed}" allowfullscreen loading="lazy"></iframe></div>`
            : `<div class="no-video">No video available</div>`
          }
        </div>`;
    }).join('');

    return `
      <div class="day-section">
        <div class="date-heading">${formatDate(day.date)}</div>
        ${gamesHtml}
      </div>`;
  }).join('');

  document.getElementById('results').innerHTML = html;
}

render();

function renderStandings() {
  function tableHtml(teams) {
    return teams.map((t, i) => `
      <tr class="${i === 0 ? 'rank-1' : ''}">
        <td><span class="rank-num">${i + 1}</span>${t.name}</td>
        <td>${t.g}</td>
        <td>${t.w}</td>
        <td>${t.l}</td>
        <td>${t.t}</td>
        <td class="pct-col">${t.pct}</td>
        <td>${t.gb}</td>
      </tr>`).join('');
  }

  const html = `
    <div class="standings-box">
      <div class="standings-head">Central League</div>
      <table class="standings-table">
        <thead><tr>
          <th>Team</th><th>G</th><th>W</th><th>L</th><th>T</th><th>PCT</th><th>GB</th>
        </tr></thead>
        <tbody>${tableHtml(STANDINGS.central)}</tbody>
      </table>
      <div class="standings-updated">Updated: ${STANDINGS.updated}</div>
    </div>
    <div class="standings-box">
      <div class="standings-head">Pacific League</div>
      <table class="standings-table">
        <thead><tr>
          <th>Team</th><th>G</th><th>W</th><th>L</th><th>T</th><th>PCT</th><th>GB</th>
        </tr></thead>
        <tbody>${tableHtml(STANDINGS.pacific)}</tbody>
      </table>
      <div class="standings-updated">Updated: ${STANDINGS.updated}</div>
    </div>`;

  document.getElementById('sidebar').innerHTML = html;
}
